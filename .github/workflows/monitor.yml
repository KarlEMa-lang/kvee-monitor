name: kv.ee Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Seadista Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installi teegid
        run: pip install -r requirements.txt

      - name: Käivita monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kv_monitor.py

      - name: Salvesta nähtud kuulutused reposse
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nahtud_kuulutused.json
          git diff --staged --quiet || git commit -m "Uuenda nähtud kuulutused"
          git push
